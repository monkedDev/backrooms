<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms - 3D Web Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #d4a017;
            z-index: 100;
        }
        #overlay h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px #d4a017;
        }
        #overlay p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #aaa;
        }
        #start-btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            background: #d4a017;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
        }
        #start-btn:hover {
            background: #f4c047;
            transform: scale(1.05);
        }
        #instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            z-index: 50;
            display: none;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d4a017;
            font-size: 1.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>THE BACKROOMS</h1>
        <p>Level 0 - Lobby</p>
        <button id="start-btn">ВОЙТИ</button>
    </div>
    <div id="loading">Загрузка...</div>
    <div id="instructions">
        WASD - движение | SHIFT - бег | Мышь - обзор | F - фонарик | ESC - пауза
    </div>
    <canvas id="canvas"></canvas>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { LevelGenerator } from './js/generate.js?v=5';

        // === КОНФИГУРАЦИЯ ===
        const CONFIG = {
            roomWidth: 10,
            roomHeight: 3.5,
            roomDepth: 10,
            corridorWidth: 3,
            gridSize: 9,
            moveSpeed: 5,
            runSpeed: 10,
            lookSpeed: 0.002
        };

        // === ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ===
        let scene, camera, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, isRunning = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let rooms = [];
        let flashlight;
        let flashlightOn = true;

        // === ЗАГРУЗКА ТЕКСТУР ===
        const textureLoader = new THREE.TextureLoader();
        const textures = {};

        async function loadTextures() {
            return Promise.all([
                new Promise((resolve) => {
                    textures.wallpaper = textureLoader.load('textures/wallpaper_color.png', resolve);
                }),
                new Promise((resolve) => {
                    textures.carpet = textureLoader.load('textures/carpet_color.png', resolve);
                }),
                new Promise((resolve) => {
                    textures.ceiling = textureLoader.load('textures/ceiling_tiles_color.png', resolve);
                })
            ]).then(() => {
                Object.values(textures).forEach(texture => {
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.RepeatWrapping;
                    texture.colorSpace = THREE.SRGBColorSpace;
                });
                textures.wallpaper.repeat.set(2, 2);
                textures.carpet.repeat.set(2, 2);
                textures.ceiling.repeat.set(2, 2);
            });
        }

        // === СОЗДАНИЕ МАТЕРИАЛОВ ===
        function createMaterials() {
            return {
                wallpaper: new THREE.MeshStandardMaterial({
                    map: textures.wallpaper,
                    roughness: 0.8,
                    metalness: 0.1
                }),
                carpet: new THREE.MeshStandardMaterial({
                    map: textures.carpet,
                    roughness: 0.9,
                    metalness: 0.0
                }),
                ceiling: new THREE.MeshStandardMaterial({
                    map: textures.ceiling,
                    roughness: 0.7,
                    metalness: 0.1
                })
            };
        }

        // === ГЕНЕРАЦИЯ УРОВНЯ ===
        function generateLevel(materials, scene) {
            const generator = new LevelGenerator(CONFIG, THREE);
            rooms = generator.generateLevel(materials, scene);
        }

        // === ИНИЦИАЛИЗАЦИЯ ===
        async function init() {
            // Загрузка текстур
            document.getElementById('loading').style.display = 'block';
            await loadTextures();
            document.getElementById('loading').style.display = 'none';

            // Сцена
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            scene.fog = new THREE.FogExp2(0x1a1a1a, 0.015);

            // Камера
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, CONFIG.roomHeight / 2, 0);

            // Рендерер
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('canvas'),
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            // Материалы
            const materials = createMaterials();

            // Генерация уровня
            generateLevel(materials, scene);

            // Общее освещение
            const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
            scene.add(ambientLight);

            // Фонарик
            flashlight = new THREE.SpotLight(0xffffee, 2, 25, Math.PI / 6, 0.5, 1);
            flashlight.position.set(0, 0, 0);
            flashlight.target.position.set(0, 0, -1);
            camera.add(flashlight);
            camera.add(flashlight.target);
            scene.add(camera);

            // Controls
            controls = new PointerLockControls(camera, document.body);

            // Обработчики событий
            const overlay = document.getElementById('overlay');
            const startBtn = document.getElementById('start-btn');
            const instructions = document.getElementById('instructions');

            startBtn.addEventListener('click', () => {
                console.log('Start button clicked');
                if (controls) {
                    overlay.style.display = 'none';
                    instructions.style.display = 'block';
                    controls.lock();
                } else {
                    console.error('Controls not initialized');
                }
            });

            controls.addEventListener('lock', () => {
                instructions.style.display = 'block';
            });

            controls.addEventListener('unlock', () => {
                overlay.style.display = 'flex';
                instructions.style.display = 'none';
            });

            // Управление клавишами
            const onKeyDown = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'ShiftLeft': isRunning = true; break;
                }
            };

            const onKeyUp = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': isRunning = false; break;
                    case 'KeyF': 
                        if (flashlight) {
                            flashlightOn = !flashlightOn;
                            flashlight.intensity = flashlightOn ? 2 : 0;
                        }
                        break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // Изменение размера окна
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Запуск цикла анимации
            animate();
        }

        // === АНИМАЦИЯ ===
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                // Затухание скорости
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                // Направление движения
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                // Ускорение
                const speed = isRunning ? CONFIG.runSpeed : CONFIG.moveSpeed;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * 10.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * 10.0 * delta;

                // Движение
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // Ограничение высоты камеры
                camera.position.y = CONFIG.roomHeight / 2;
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        // Запуск
        init();
    </script>
</body>
</html>
